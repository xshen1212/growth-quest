<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 成长冒险岛</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h1 class="login-title">管理后台</h1>
            <p style="color:var(--text-secondary);margin-bottom:20px">请输入管理密码</p>
            <input type="password" class="gq-input" id="pwd-input" placeholder="请输入密码..." autofocus>
            <button class="gq-btn gq-btn-primary gq-btn-lg" style="width:100%;margin-top:8px" id="login-btn">登录</button>
            <p style="margin-top:16px"><a href="../index.html" style="color:var(--text-secondary);font-size:0.85rem">← 返回前台</a></p>
        </div>
    </div>
    <script src="../js/store.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const pwd = Store.get('admin_password') || '123456';
        document.getElementById('login-btn').addEventListener('click', doLogin);
        document.getElementById('pwd-input').addEventListener('keyup', e => { if (e.key === 'Enter') doLogin(); });
        function doLogin() {
            const input = document.getElementById('pwd-input').value;
            if (input === pwd) {
                sessionStorage.setItem('gq_admin_auth', '1');
                location.href = 'dashboard.html';
            } else {
                Utils.showToast('密码错误！', 'error');
                document.getElementById('pwd-input').value = '';
                document.getElementById('pwd-input').focus();
            }
        }
    </script>
</body>
</html>
