<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖励商城 - 成长冒险岛</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/front.css">
</head>
<body>
    <div class="gq-container">
        <div class="gq-page-header">
            <h1 class="gq-page-title">🎁 奖励商城</h1>
            <p style="font-size:1.1rem;font-weight:700;color:var(--color-accent-dark)">🪙 当前金币：<span id="current-points">0</span></p>
        </div>
        <div class="shop-grid" id="shop-grid"></div>

        <div style="margin-top:20px">
            <div class="gq-card">
                <div class="gq-card-title">🎁 已购商品</div>
                <div id="purchased-items"></div>
            </div>
        </div>

        <div style="margin-top:20px">
            <div class="gq-card">
                <div class="gq-card-title">📜 兑换记录</div>
                <div id="exchange-log"></div>
            </div>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/common.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
