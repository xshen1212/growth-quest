<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 小申爱学习</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-logo p {
            color: #666;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .tab-switch {
            display: flex;
            margin-bottom: 30px;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }
        
        .tab-switch button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab-switch button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        
        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        
        .local-mode {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .local-mode a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .local-mode a:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>🌟 成长冒险岛</h1>
            <p>记录成长的每一步</p>
        </div>
        
        <div class="tab-switch">
            <button class="active" id="tab-login">登录</button>
            <button id="tab-register">注册</button>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>
            
            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>
            
            <button type="submit" class="btn-login" id="submit-btn">
                <span id="btn-text">登录</span>
            </button>
        </form>
        
        <div class="local-mode">
            <a href="index.html">📴 离线模式（数据仅保存在本地）</a>
        </div>
    </div>
    
    <script src="js/supabase-client.js"></script>
    <script src="js/supabase-adapter.js"></script>
    <script src="js/store.js"></script>
    <script>
        // 检查是否已登录
        (async function() {
            const isLoggedIn = await supabaseClient.init();
            if (isLoggedIn) {
                // 已登录，跳转到首页
                window.location.href = 'index.html';
            }
        })();
        
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        
        let isLoginMode = true;
        
        // 切换标签
        tabLogin.addEventListener('click', () => {
            isLoginMode = true;
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            btnText.textContent = '登录';
            errorMsg.style.display = 'none';
        });
        
        tabRegister.addEventListener('click', () => {
            isLoginMode = false;
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            btnText.textContent = '注册';
            errorMsg.style.display = 'none';
        });
        
        // 表单提交
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // 显示加载状态
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>';
            
            let result;
            if (isLoginMode) {
                result = await supabaseClient.signIn(email, password);
            } else {
                result = await supabaseClient.signUp(email, password);
            }
            
            submitBtn.disabled = false;
            
            if (result.success) {
                // 切换到云端存储
                await Store.switchToCloud();
                
                successMsg.textContent = isLoginMode ? '登录成功！' : '注册成功！';
                successMsg.style.display = 'block';
                btnText.textContent = '跳转中...';
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                errorMsg.textContent = result.error || '操作失败，请重试';
                errorMsg.style.display = 'block';
                btnText.textContent = isLoginMode ? '登录' : '注册';
            }
        });
    </script>
</body>
</html>
